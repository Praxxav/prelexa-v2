name: CI
on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: .
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install Node dependencies
        run: npm ci
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install prisma
      - name: Validate Prisma schema
        run: npx prisma validate --schema prisma/schema.prisma
      - name: Generate Prisma client
        run: python -m prisma generate --schema prisma/schema.prisma
      - name: Compile Python source
        run: python -m compileall app core db
      - name: Smoke test FastAPI app import
        run: |
          python -c "from app.main import app; print(app.title)"