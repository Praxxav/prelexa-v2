name: CD

on:
  push:
    branches:
      - main        # only deploy from main
  workflow_run:
    workflows: ["CI"]   # wait for CI to pass first
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-progress deploy

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only deploy if CI passed (when triggered via workflow_run)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Trigger Render Deploy
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for deployment to complete
        run: |
          echo "Deploy triggered. Waiting for Render to finish..."
          sleep 60   # Render usually takes 1-3 min, adjust as needed

      - name: Confirm deploy triggered
        run: echo " Render deployment triggered successfully for branch main"